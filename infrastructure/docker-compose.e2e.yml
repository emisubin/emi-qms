services:
  e2e-postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${E2E_DATABASE_USER:-emi_qms_e2e}
      POSTGRES_PASSWORD: ${E2E_DATABASE_PASSWORD:-e2e_local_only_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1::5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
    labels:
      emi-qms.e2e-only: "true"
