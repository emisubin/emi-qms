name: Bug report
description: 오류를 기록합니다.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 오류 요약
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      placeholder: "1. ...\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 업무·데이터 영향
