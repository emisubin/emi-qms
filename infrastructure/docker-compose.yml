services:
  postgres:
    image: postgres:18.4
    container_name: emi-qms-postgres
    environment:
      POSTGRES_DB: emi_qms_dev
      POSTGRES_USER: emi_qms
      POSTGRES_PASSWORD: local_only_change_me
    ports:
      - "5432:5432"
    volumes:
      - emi-qms-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emi_qms -d emi_qms_dev"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  emi-qms-postgres-data:
