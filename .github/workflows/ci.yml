name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  # Non-secret disposable credential used only by this workflow's PostgreSQL service.
  CI_DATABASE_PASSWORD: local_only_change_me

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: emi_qms_dev
      DATABASE_USER: emi_qms
      DATABASE_PASSWORD: ${{ env.CI_DATABASE_PASSWORD }}
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: emi_qms_dev
          POSTGRES_USER: emi_qms
          POSTGRES_PASSWORD: ${{ env.CI_DATABASE_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emi_qms -d emi_qms_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore backend/Emi.Qms.sln
      - name: Build
        run: dotnet build backend/Emi.Qms.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test backend/Emi.Qms.sln --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.8.0 --activate
      - name: Install
        run: corepack pnpm install --frozen-lockfile
      - name: Lint
        run: corepack pnpm --filter emi-qms-frontend run lint
      - name: Typecheck
        run: corepack pnpm --filter emi-qms-frontend run typecheck
      - name: Test
        run: corepack pnpm --filter emi-qms-frontend test
      - name: Build
        run: corepack pnpm --filter emi-qms-frontend run build
